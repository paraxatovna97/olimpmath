<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OlympMath — Knowledge Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --secondary: #7C3AED;
            --accent: #22D3EE;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #F43F5E;
            --bg: #0A0A0F;
            --bg-card: rgba(255, 255, 255, 0.04);
            --text: #E2E8F0;
            --text-secondary: #94A3B8;
            --border: rgba(255, 255, 255, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* ─── NAVBAR ─── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 32px;
            background: rgba(10, 10, 15, 0.72);
            backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar__logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.02em;
        }

        .navbar__logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .navbar__links {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .navbar__link {
            padding: 8px 16px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .navbar__link:hover {
            color: var(--text);
            background: var(--bg-card);
        }

        .navbar__link.active {
            color: var(--text);
            background: var(--bg-card);
        }

        .navbar__actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn--ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn--ghost:hover {
            color: var(--text);
            background: var(--bg-card);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .btn--primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.25);
        }

        .btn--primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 28px rgba(79, 70, 229, 0.35);
        }

        .btn--sm {
            padding: 6px 16px;
            font-size: 13px;
        }

        .navbar__menu-toggle {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .navbar__menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-secondary);
            border-radius: 2px;
            transition: all 0.25s ease;
        }

        /* ─── CANVAS WRAPPER ─── */
        .canvas-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #knowledge-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            z-index: 1;
        }

        #knowledge-canvas:active {
            cursor: grabbing;
        }

        /* ─── CURSOR GLOW ─── */
        .cursor-glow {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            mix-blend-mode: screen;
            will-change: transform;
        }

        /* ─── MINIMAP ─── */
        .minimap {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 50;
            width: 160px;
            height: 100px;
            border-radius: var(--radius);
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(16px) saturate(1.2);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .minimap canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .minimap__viewport {
            position: absolute;
            border: 1.5px solid rgba(79, 70, 229, 0.6);
            border-radius: 4px;
            background: rgba(79, 70, 229, 0.08);
            pointer-events: none;
            transition: all 0.1s ease;
        }

        /* ─── TOOLTIP ─── */
        .tooltip {
            position: fixed;
            z-index: 60;
            pointer-events: none;
            background: rgba(10, 10, 15, 0.88);
            backdrop-filter: blur(16px) saturate(1.4);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            min-width: 180px;
            opacity: 0;
            transform: translateY(8px) scale(0.96);
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: var(--shadow);
        }

        .tooltip.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .tooltip__title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .tooltip__subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .tooltip__progress {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tooltip__bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .tooltip__bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s ease;
        }

        .tooltip__label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            min-width: 32px;
            text-align: right;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1024px) {
            .navbar__links {
                display: none;
            }

            .navbar__menu-toggle {
                display: flex;
            }

            .minimap {
                width: 120px;
                height: 75px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 12px 16px;
            }

            .navbar__logo-text {
                display: none;
            }

            .btn--sm {
                padding: 4px 12px;
                font-size: 12px;
            }

            .minimap {
                width: 80px;
                height: 50px;
                bottom: 14px;
                right: 14px;
            }

            .tooltip {
                padding: 12px 16px;
                min-width: 140px;
            }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <header class="navbar" role="navigation" aria-label="Asosiy navigatsiya">
        <a href="#" class="navbar__logo" aria-label="OlympMath bosh sahifa">
            <span class="navbar__logo-icon">π</span>
            <span class="navbar__logo-text">OlympMath</span>
        </a>
        <nav class="navbar__links" aria-label="Menyu">
            <a href="#" class="navbar__link">Bosh sahifa</a>
            <a href="#" class="navbar__link active">Knowledge Map</a>
            <a href="#" class="navbar__link">Darslar</a>
            <a href="#" class="navbar__link">AI Mentor</a>
            <a href="#" class="navbar__link">Dashboard</a>
        </nav>
        <div class="navbar__actions">
            <button class="btn btn--ghost btn--sm">Kirish</button>
            <button class="btn btn--primary btn--sm">Boshlash</button>
            <button class="navbar__menu-toggle" aria-label="Menyuni ochish">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- ===== CANVAS ===== -->
    <div class="canvas-wrapper">
        <canvas id="starfield"></canvas>
        <canvas id="knowledge-canvas"></canvas>
    </div>

    <!-- ===== CURSOR GLOW ===== -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- ===== MINIMAP ===== -->
    <div class="minimap" id="minimap">
        <canvas id="minimap-canvas"></canvas>
        <div class="minimap__viewport" id="minimap-viewport"></div>
    </div>

    <!-- ===== TOOLTIP ===== -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip__title" id="tooltip-title">Algebra</div>
        <div class="tooltip__subtitle" id="tooltip-subtitle">Difficulty: 4</div>
        <div class="tooltip__progress">
            <div class="tooltip__bar">
                <div class="tooltip__bar-fill" id="tooltip-fill" style="width: 0%;"></div>
            </div>
            <span class="tooltip__label" id="tooltip-label">0%</span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM REFS ───
            const canvas = document.getElementById('knowledge-canvas');
            const ctx = canvas.getContext('2d');
            const starCanvas = document.getElementById('starfield');
            const starCtx = starCanvas.getContext('2d');
            const minimapCanvas = document.getElementById('minimap-canvas');
            const minimapCtx = minimapCanvas.getContext('2d');
            const minimapViewport = document.getElementById('minimap-viewport');
            const tooltip = document.getElementById('tooltip');
            const tooltipTitle = document.getElementById('tooltip-title');
            const tooltipSubtitle = document.getElementById('tooltip-subtitle');
            const tooltipFill = document.getElementById('tooltip-fill');
            const tooltipLabel = document.getElementById('tooltip-label');
            const cursorGlow = document.getElementById('cursor-glow');

            // ─── NODE DATA ───
            const DOMAINS = [
                { id: 'matematika', label: 'Matematika', x: 0, y: 0, radius: 58, color: '#4F46E5', difficulty: 1,
                mastery: 100 },
                { id: 'arifmetika', label: 'Arifmetika', x: -280, y: -160, radius: 44, color: '#22D3EE', difficulty: 1,
                    mastery: 92 },
                { id: 'algebra', label: 'Algebra', x: -160, y: -280, radius: 44, color: '#7C3AED', difficulty: 3,
                    mastery: 78 },
                { id: 'geometriya', label: 'Geometriya', x: 160, y: -280, radius: 44, color: '#10B981', difficulty: 3,
                    mastery: 65 },
                { id: 'trigonometriya', label: 'Trigonometriya', x: 280, y: -160, radius: 44, color: '#F59E0B',
                    difficulty: 4, mastery: 42 },
                { id: 'sonlar', label: 'Sonlar nazariyasi', x: -320, y: 0, radius: 44, color: '#F43F5E', difficulty: 4,
                    mastery: 38 },
                { id: 'tenglamalar', label: 'Tenglamalar', x: -240, y: 120, radius: 44, color: '#22D3EE', difficulty: 2,
                    mastery: 85 },
                { id: 'tengsizliklar', label: 'Tengsizliklar', x: -120, y: 240, radius: 44, color: '#7C3AED',
                    difficulty: 3, mastery: 70 },
                { id: 'funksiyalar', label: 'Funksiyalar', x: 120, y: 240, radius: 44, color: '#10B981', difficulty: 3,
                    mastery: 60 },
                { id: 'ketma-ketliklar', label: 'Ketma-ketliklar', x: 240, y: 120, radius: 44, color: '#F59E0B',
                    difficulty: 4, mastery: 45 },
                { id: 'kombinatorika', label: 'Kombinatorika', x: -200, y: -80, radius: 40, color: '#F43F5E',
                    difficulty: 5, mastery: 30 },
                { id: 'ehtimollar', label: 'Ehtimollar', x: 200, y: -80, radius: 40, color: '#22D3EE', difficulty: 5,
                    mastery: 28 },
                { id: 'analitik', label: 'Analitik geometriya', x: -80, y: -200, radius: 40, color: '#7C3AED',
                    difficulty: 4, mastery: 50 },
                { id: 'graflar', label: 'Graflar nazariyasi', x: 80, y: -200, radius: 40, color: '#10B981',
                    difficulty: 5, mastery: 25 },
                { id: 'mantiq', label: 'Matematik mantiq', x: -200, y: 200, radius: 40, color: '#F59E0B', difficulty: 4,
                    mastery: 35 },
                { id: 'olimpiada', label: 'Olimpiada strategiyalari', x: 200, y: 200, radius: 40, color: '#F43F5E',
                    difficulty: 6, mastery: 20 },
            ];

            const EDGES = [
                ['matematika', 'arifmetika'],
                ['matematika', 'algebra'],
                ['matematika', 'geometriya'],
                ['matematika', 'trigonometriya'],
                ['matematika', 'sonlar'],
                ['matematika', 'kombinatorika'],
                ['matematika', 'ehtimollar'],
                ['matematika', 'olimpiada'],
                ['algebra', 'tenglamalar'],
                ['algebra', 'tengsizliklar'],
                ['algebra', 'funksiyalar'],
                ['algebra', 'ketma-ketliklar'],
                ['geometriya', 'analitik'],
                ['geometriya', 'trigonometriya'],
                ['sonlar', 'mantiq'],
                ['sonlar', 'graflar'],
                ['tenglamalar', 'tengsizliklar'],
                ['funksiyalar', 'ketma-ketliklar'],
                ['kombinatorika', 'ehtimollar'],
            ];

            // ─── STATE ───
            let nodes = [];
            let edges = [];
            let scale = 1;
            let offsetX = 0;
            let offsetY = 0;
            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragOffsetX = 0;
            let dragOffsetY = 0;
            let hoveredNode = null;
            let selectedNode = null;
            let animatingTo = null;
            let animProgress = 0;
            let animStartX = 0;
            let animStartY = 0;
            let animStartScale = 0;
            let entryPhase = 0;
            let entryProgress = 0;
            let stars = [];
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let frameId = null;

            const MIN_SCALE = 0.2;
            const MAX_SCALE = 2.5;
            const BASE_RADIUS = 58;
            const NODE_GAP = 60;
            const VIEWPORT_PADDING = 40;

            // ─── NODE HELPER ───
            function buildNode(data) {
                return {
                    ...data,
                    rx: data.x,
                    ry: data.y,
                    scale: 1,
                    glow: 0,
                    entryDelay: 0,
                    entryDone: false,
                };
            }

            function initNodes() {
                nodes = DOMAINS.map((d, i) => {
                    const node = buildNode(d);
                    node.entryDelay = i * 60;
                    return node;
                });
                edges = EDGES.map(([from, to]) => {
                    const f = nodes.find(n => n.id === from);
                    const t = nodes.find(n => n.id === to);
                    return { from: f, to: t };
                });
            }

            // ─── STARS ───
            function initStars() {
                const count = 220;
                stars = [];
                for (let i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random(),
                        y: Math.random(),
                        radius: 0.5 + Math.random() * 1.8,
                        brightness: 0.3 + Math.random() * 0.7,
                        speed: 0.0003 + Math.random() * 0.0008,
                        phase: Math.random() * Math.PI * 2,
                    });
                }
            }

            // ─── RESIZE ───
            function resize() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                starCanvas.width = w;
                starCanvas.height = h;
                minimapCanvas.width = 160;
                minimapCanvas.height = 100;
                updateMinimapViewport();
            }

            // ─── WORLD ───
            function worldToScreen(wx, wy) {
                return {
                    x: wx * scale + offsetX,
                    y: wy * scale + offsetY,
                };
            }

            function screenToWorld(sx, sy) {
                return {
                    x: (sx - offsetX) / scale,
                    y: (sy - offsetY) / scale,
                };
            }

            function getNodeScreen(node) {
                return worldToScreen(node.rx, node.ry);
            }

            function getNodeRadius(node) {
                return node.radius * scale * node.scale;
            }

            function isNodeHovered(node, mx, my) {
                const pos = getNodeScreen(node);
                const r = getNodeRadius(node);
                const dx = mx - pos.x;
                const dy = my - pos.y;
                return dx * dx + dy * dy < r * r;
            }

            // ─── DRAW ───
            function drawEdges() {
                for (const edge of edges) {
                    const f = getNodeScreen(edge.from);
                    const t = getNodeScreen(edge.to);
                    const fR = getNodeRadius(edge.from);
                    const tR = getNodeRadius(edge.to);
                    const dx = t.x - f.x;
                    const dy = t.y - f.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist === 0) continue;
                    const ux = dx / dist;
                    const uy = dy / dist;
                    const startX = f.x + ux * fR;
                    const startY = f.y + uy * fR;
                    const endX = t.x - ux * tR;
                    const endY = t.y - uy * tR;

                    const alpha = Math.min(0.4, 0.2 + 0.2 * scale);
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 1.2 * Math.min(scale, 1.5);
                    ctx.stroke();

                    // Glow on hover
                    if (hoveredNode && (edge.from === hoveredNode || edge.to === hoveredNode)) {
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        ctx.strokeStyle = `rgba(79, 70, 229, 0.3)`;
                        ctx.lineWidth = 4 * Math.min(scale, 1.5);
                        ctx.shadowColor = 'rgba(79, 70, 229, 0.3)';
                        ctx.shadowBlur = 12;
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            function drawNodes() {
                const now = performance.now();

                for (const node of nodes) {
                    const pos = getNodeScreen(node);
                    const r = getNodeRadius(node);

                    // Entry animation
                    if (!node.entryDone) {
                        const elapsed = Math.max(0, now - node.entryDelay);
                        const progress = Math.min(1, elapsed / 800);
                        const ease = 1 - Math.pow(1 - progress, 3);
                        const currentScale = ease;
                        node._entryScale = currentScale;
                        if (progress >= 1) node.entryDone = true;
                    }

                    const entryScale = node.entryDone ? 1 : node._entryScale || 0;
                    const finalR = r * Math.max(0.01, entryScale);
                    const finalAlpha = node.entryDone ? 1 : Math.min(1, entryScale * 1.5);

                    // Glow
                    let glowIntensity = node.glow || 0;
                    if (hoveredNode === node) {
                        glowIntensity = Math.min(1, glowIntensity + 0.05);
                    } else {
                        glowIntensity = Math.max(0, glowIntensity - 0.02);
                    }
                    node.glow = glowIntensity;

                    // Shadow / glow
                    if (glowIntensity > 0.01) {
                        const glowR = finalR * (1 + 0.5 * glowIntensity);
                        const grad = ctx.createRadialGradient(pos.x, pos.y, finalR * 0.6, pos.x, pos.y, glowR);
                        grad.addColorStop(0, `rgba(79, 70, 229, ${0.25 * glowIntensity})`);
                        grad.addColorStop(1, 'rgba(79, 70, 229, 0)');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Node
                    const color = node.color || '#4F46E5';
                    ctx.globalAlpha = finalAlpha;
                    ctx.shadowColor = `rgba(79, 70, 229, ${0.15 * glowIntensity})`;
                    ctx.shadowBlur = 20 * glowIntensity;

                    const grad = ctx.createRadialGradient(
                        pos.x - finalR * 0.25, pos.y - finalR * 0.25, 0,
                        pos.x, pos.y, finalR
                    );
                    grad.addColorStop(0, lightenColor(color, 30));
                    grad.addColorStop(0.7, color);
                    grad.addColorStop(1, darkenColor(color, 20));

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, finalR, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;

                    // Border
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.06 + 0.08 * glowIntensity})`;
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, finalR, 0, Math.PI * 2);
                    ctx.stroke();

                    // Text
                    ctx.globalAlpha = finalAlpha * (0.8 + 0.2 * glowIntensity);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = `${Math.max(10, 13 * Math.min(1, scale * 0.8))}px 'Inter', sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.label, pos.x, pos.y);

                    // Mastery ring
                    if (node.mastery !== undefined && node.mastery > 0) {
                        const ringR = finalR + 6;
                        const startAngle = -Math.PI / 2;
                        const endAngle = startAngle + (node.mastery / 100) * Math.PI * 2;
                        ctx.globalAlpha = finalAlpha * 0.5;
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, ringR, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.strokeStyle = `rgba(79, 70, 229, 0.5)`;
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, ringR, startAngle, endAngle);
                        ctx.stroke();
                    }

                    ctx.globalAlpha = 1;
                }
            }

            function drawStars() {
                const w = starCanvas.width;
                const h = starCanvas.height;
                starCtx.clearRect(0, 0, w, h);

                const now = performance.now();
                for (const star of stars) {
                    const x = star.x * w;
                    const y = star.y * h;
                    const brightness = star.brightness * (0.7 + 0.3 * Math.sin(now * star.speed + star.phase));
                    const alpha = 0.3 + 0.7 * brightness;
                    starCtx.globalAlpha = alpha;
                    starCtx.fillStyle = '#FFFFFF';
                    starCtx.beginPath();
                    starCtx.arc(x, y, star.radius * (0.8 + 0.2 * brightness), 0, Math.PI * 2);
                    starCtx.fill();
                }
                starCtx.globalAlpha = 1;
            }

            function drawBackground() {
                const w = canvas.width;
                const h = canvas.height;
                const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.8);
                grad.addColorStop(0, 'rgba(15, 15, 30, 1)');
                grad.addColorStop(0.5, 'rgba(10, 10, 20, 1)');
                grad.addColorStop(1, 'rgba(5, 5, 10, 1)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // Subtle vignette
                const vg = ctx.createRadialGradient(w / 2, h / 2, w * 0.1, w / 2, h / 2, w * 0.8);
                vg.addColorStop(0, 'rgba(79, 70, 229, 0.03)');
                vg.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = vg;
                ctx.fillRect(0, 0, w, h);
            }

            // ─── MAIN LOOP ───
            function render() {
                const w = canvas.width;
                const h = canvas.height;

                // Animate to target
                if (animatingTo) {
                    animProgress += 0.025;
                    if (animProgress >= 1) {
                        animProgress = 1;
                        animatingTo = null;
                    }
                    const ease = 1 - Math.pow(1 - animProgress, 3);
                    offsetX = animStartX + (animatingTo ? animatingTo._targetX - animStartX : 0) * ease;
                    offsetY = animStartY + (animatingTo ? animatingTo._targetY - animStartY : 0) * ease;
                    scale = animStartScale + (animatingTo ? animatingTo._targetScale - animStartScale : 0) * ease;
                }

                // Draw
                drawBackground();
                drawStars();
                drawEdges();
                drawNodes();

                // Update minimap
                updateMinimap();

                frameId = requestAnimationFrame(render);
            }

            // ─── MINIMAP ───
            function updateMinimap() {
                const mw = minimapCanvas.width;
                const mh = minimapCanvas.height;
                const mc = minimapCtx;

                mc.clearRect(0, 0, mw, mh);

                // Background
                mc.fillStyle = 'rgba(10, 10, 15, 0.4)';
                mc.fillRect(0, 0, mw, mh);

                // Find bounds
                let minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                for (const node of nodes) {
                    if (node.rx < minX) minX = node.rx;
                    if (node.ry < minY) minY = node.ry;
                    if (node.rx > maxX) maxX = node.rx;
                    if (node.ry > maxY) maxY = node.ry;
                }
                const pad = 40;
                minX -= pad;
                minY -= pad;
                maxX += pad;
                maxY += pad;
                const rangeX = maxX - minX || 1;
                const rangeY = maxY - minY || 1;
                const aspect = rangeX / rangeY;
                let drawW, drawH;
                if (aspect > mw / mh) {
                    drawW = mw * 0.8;
                    drawH = drawW / aspect;
                } else {
                    drawH = mh * 0.8;
                    drawW = drawH * aspect;
                }
                const ox = (mw - drawW) / 2;
                const oy = (mh - drawH) / 2;

                const toMinimap = (wx, wy) => {
                    const x = ox + ((wx - minX) / rangeX) * drawW;
                    const y = oy + ((wy - minY) / rangeY) * drawH;
                    return { x, y };
                };

                // Edges
                mc.strokeStyle = 'rgba(255,255,255,0.06)';
                mc.lineWidth = 0.5;
                for (const edge of edges) {
                    const f = toMinimap(edge.from.rx, edge.from.ry);
                    const t = toMinimap(edge.to.rx, edge.to.ry);
                    mc.beginPath();
                    mc.moveTo(f.x, f.y);
                    mc.lineTo(t.x, t.y);
                    mc.stroke();
                }

                // Nodes
                for (const node of nodes) {
                    const p = toMinimap(node.rx, node.ry);
                    const r = Math.max(2, 4 * (node.radius / BASE_RADIUS));
                    mc.fillStyle = node.color || '#4F46E5';
                    mc.globalAlpha = 0.7;
                    mc.beginPath();
                    mc.arc(p.x, p.y, r, 0, Math.PI * 2);
                    mc.fill();
                    mc.globalAlpha = 1;
                }

                // Viewport
                const vx = ox + ((0 - minX) / rangeX) * drawW;
                const vy = oy + ((0 - minY) / rangeY) * drawH;
                const vw = (canvas.width / (scale * rangeX)) * drawW;
                const vh = (canvas.height / (scale * rangeY)) * drawH;
                minimapViewport.style.left = (vx - 1) + 'px';
                minimapViewport.style.top = (vy - 1) + 'px';
                minimapViewport.style.width = Math.min(mw - vx, vw + 2) + 'px';
                minimapViewport.style.height = Math.min(mh - vy, vh + 2) + 'px';
            }

            function updateMinimapViewport() {
                // just trigger redraw
                if (frameId) {
                    // minimap updates each frame
                }
            }

            // ─── COLOR HELPERS ───
            function lightenColor(hex, amt) {
                let c = hexToRgb(hex);
                return `rgb(${Math.min(255, c.r + amt)}, ${Math.min(255, c.g + amt)}, ${Math.min(255, c.b + amt)})`;
            }

            function darkenColor(hex, amt) {
                let c = hexToRgb(hex);
                return `rgb(${Math.max(0, c.r - amt)}, ${Math.max(0, c.g - amt)}, ${Math.max(0, c.b - amt)})`;
            }

            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 79, g: 70, b: 229 };
            }

            // ─── ZOOM ───
            function zoomAt(factor, cx, cy) {
                const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
                if (newScale === scale) return;
                const world = screenToWorld(cx, cy);
                offsetX = cx - world.x * newScale;
                offsetY = cy - world.y * newScale;
                scale = newScale;
            }

            function zoomToNode(node) {
                const pos = getNodeScreen(node);
                const targetScale = Math.min(1.2, Math.max(0.8, 800 / (node.radius * 2)));
                const targetX = canvas.width / 2 - node.rx * targetScale;
                const targetY = canvas.height / 2 - node.ry * targetScale;
                animatingTo = node;
                node._targetX = targetX;
                node._targetY = targetY;
                node._targetScale = targetScale;
                animStartX = offsetX;
                animStartY = offsetY;
                animStartScale = scale;
                animProgress = 0;
                selectedNode = node;
            }

            // ─── EVENTS ───
            function onMouseMove(e) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                mouseX = e.clientX;
                mouseY = e.clientY;

                // Cursor glow
                cursorGlow.style.left = e.clientX + 'px';
                cursorGlow.style.top = e.clientY + 'px';

                // Hover
                let found = null;
                for (const node of nodes) {
                    if (isNodeHovered(node, mx, my)) {
                        found = node;
                        break;
                    }
                }

                if (found !== hoveredNode) {
                    hoveredNode = found;
                    if (hoveredNode) {
                        tooltipTitle.textContent = hoveredNode.label;
                        tooltipSubtitle.textContent = `Difficulty: ${hoveredNode.difficulty || 1}`;
                        const mastery = hoveredNode.mastery || 0;
                        tooltipFill.style.width = mastery + '%';
                        tooltipLabel.textContent = mastery + '%';
                        tooltip.classList.add('visible');
                        const pos = getNodeScreen(hoveredNode);
                        const r = getNodeRadius(hoveredNode);
                        let tx = pos.x + r + 16;
                        let ty = pos.y - 20;
                        if (tx + 200 > canvas.width) tx = pos.x - r - 16 - 200;
                        if (ty + 80 > canvas.height) ty = canvas.height - 80;
                        if (ty < 20) ty = 20;
                        tooltip.style.left = Math.max(10, tx) + 'px';
                        tooltip.style.top = Math.max(10, ty) + 'px';
                    } else {
                        tooltip.classList.remove('visible');
                    }
                    canvas.style.cursor = found ? 'pointer' : isDragging ? 'grabbing' : 'grab';
                }

                // Parallax for nodes
                const px = (e.clientX / window.innerWidth - 0.5) * 2;
                const py = (e.clientY / window.innerHeight - 0.5) * 2;
                for (const node of nodes) {
                    const shift = 4 * (1 - scale / MAX_SCALE);
                    node._parallaxX = px * shift;
                    node._parallaxY = py * shift;
                }
            }

            function onMouseDown(e) {
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                dragOffsetX = offsetX;
                dragOffsetY = offsetY;
                canvas.style.cursor = 'grabbing';
            }

            function onMouseUp(e) {
                if (isDragging) {
                    const dx = e.clientX - dragStartX;
                    const dy = e.clientY - dragStartY;
                    if (Math.abs(dx) < 5 && Math.abs(dy) < 5 && hoveredNode) {
                        zoomToNode(hoveredNode);
                    }
                    isDragging = false;
                    canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
                }
            }

            function onMouseDrag(e) {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                offsetX = dragOffsetX + dx;
                offsetY = dragOffsetY + dy;
            }

            function onWheel(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const cx = e.clientX - rect.left;
                const cy = e.clientY - rect.top;
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                zoomAt(factor, cx, cy);
            }

            function onKeyDown(e) {
                if (e.ctrlKey && e.key === '=') {
                    e.preventDefault();
                    zoomAt(1.1, canvas.width / 2, canvas.height / 2);
                } else if (e.ctrlKey && e.key === '-') {
                    e.preventDefault();
                    zoomAt(0.9, canvas.width / 2, canvas.height / 2);
                } else if (e.key === 'Escape') {
                    // Reset view
                    animatingTo = null;
                    offsetX = canvas.width / 2;
                    offsetY = canvas.height / 2;
                    scale = 1;
                    selectedNode = null;
                }
            }

            // ─── INIT ───
            function init() {
                initNodes();
                initStars();
                resize();

                // Center view
                offsetX = canvas.width / 2;
                offsetY = canvas.height / 2;
                scale = 1;

                // Events
                window.addEventListener('resize', resize);
                canvas.addEventListener('mousemove', onMouseMove);
                canvas.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mouseup', onMouseUp);
                window.addEventListener('mousemove', onMouseDrag);
                canvas.addEventListener('wheel', onWheel, { passive: false });
                window.addEventListener('keydown', onKeyDown);

                // Touch support
                let touchStartX = 0,
                    touchStartY = 0;
                let touchOffsetX = 0,
                    touchOffsetY = 0;
                let lastTouchDist = 0;
                let isTouching = false;

                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const t = e.touches;
                    if (t.length === 1) {
                        isTouching = true;
                        touchStartX = t[0].clientX;
                        touchStartY = t[0].clientY;
                        touchOffsetX = offsetX;
                        touchOffsetY = offsetY;
                    } else if (t.length === 2) {
                        const dx = t[0].clientX - t[1].clientX;
                        const dy = t[0].clientY - t[1].clientY;
                        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
                    }
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const t = e.touches;
                    if (t.length === 1 && isTouching) {
                        const dx = t[0].clientX - touchStartX;
                        const dy = t[0].clientY - touchStartY;
                        offsetX = touchOffsetX + dx;
                        offsetY = touchOffsetY + dy;
                    } else if (t.length === 2) {
                        const dx = t[0].clientX - t[1].clientX;
                        const dy = t[0].clientY - t[1].clientY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const factor = dist / lastTouchDist;
                        if (factor > 0.1 && factor < 10) {
                            const cx = (t[0].clientX + t[1].clientX) / 2 - canvas.getBoundingClientRect().left;
                            const cy = (t[0].clientY + t[1].clientY) / 2 - canvas.getBoundingClientRect().top;
                            zoomAt(factor, cx, cy);
                        }
                        lastTouchDist = dist;
                    }
                }, { passive: false });

                canvas.addEventListener('touchend', (e) => {
                    isTouching = false;
                    if (e.changedTouches.length === 1 && hoveredNode) {
                        zoomToNode(hoveredNode);
                    }
                });

                // Start render
                render();
            }

            // Wait for DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
